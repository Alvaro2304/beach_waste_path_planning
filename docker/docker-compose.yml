services:
  ros2-dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        USER_UID: ${USER_UID:-1000}
        USER_GID: ${USER_GID:-1000}
    image: beach_robot:jazzy
    container_name: beach_robot_dev
    runtime: nvidia

    environment:
      - DISPLAY=${DISPLAY}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      # Prevent Qt shared memory issues inside container
      - QT_X11_NO_MITSHM=1
      # ROS 2 domain (change if you have multiple robots / containers)
      - ROS_DOMAIN_ID=0

    volumes:
      # X11 socket for GUI forwarding
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      # Mount the project as the ROS 2 workspace source
      - ../src:/ros2_ws/src:rw
      - ../config:/ros2_ws/config:rw
      # Persistent build cache (avoids rebuilding inside container each time)
      - build_cache:/ros2_ws/build
      - install_cache:/ros2_ws/install
      - log_cache:/ros2_ws/log

    # Host networking for DDS discovery (avoids multicast issues)
    network_mode: host
    # Shared memory transport for fast intra-host comms
    ipc: host

    stdin_open: true
    tty: true

volumes:
  build_cache:
  install_cache:
  log_cache:
